server:
  port: ${SPRING_PORT}
  forward-headers-strategy: native
  servlet:
    session:
      cookie:
        same-site: none
        secure: true
        http-only: true
        path: /
  error:
    include-stacktrace: never

front:
  base-url: ${FRONT_BASEURL}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 15
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: Asia/Seoul
        dialect: org.hibernate.dialect.MySQLDialect
  oauth2:
    github:
      client:
        id: ${GITHUB_CLIENT_ID}
        secret: ${GITHUB_CLIENT_SECRET}
        redirect-uri: ${GITHUB_REDIRECT_URI}
      urls:
        access-token: https://github.com/login/oauth/access_token
        user: https://api.github.com/user
  flyway:
    enabled: false
    baseline-on-migrate: false
  threads:
    virtual:
      enabled: true
  devtools:
    restart:
      enabled: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.debug: true

logging:
  level:
    root: INFO
    org.springframework.mail: DEBUG
    org.eclipse.angus.mail: DEBUG
    jakarta.mail: DEBUG
  file:
    path: ./logs
    name: app.log

springdoc:
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  cache:
    disabled: true
  api-docs:
    path: /api-docs/json
    groups:
      enabled: true
  swagger-ui:
    enabled: true
    path: /swagger
    tags-sorter: alpha
    operations-sorter: alpha
